<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>455 Project — IS 455</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --fg: #e7ecf3;
        --muted: #8b98a5;
        --accent: #1d9bf0;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f9fc;
          --fg: #0f1419;
          --muted: #536471;
          --accent: #1d9bf0;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            color-mix(in oklab, var(--accent) 25%, transparent),
            transparent 50%
          ),
          var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 32rem;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .links {
        margin-top: 1.25rem;
      }
      .links a {
        color: var(--accent);
        font-weight: 600;
        margin: 0 0.5rem;
      }
      .badge {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.35rem 0.75rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--accent);
        background: color-mix(in oklab, var(--accent) 12%, transparent);
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IS 455 — Machine Learning</h1>
      <p>Shop order demo: place orders and review them on the admin page.</p>
      <p class="links">
        <a href="/order">Place an order</a>
        <a href="/admin">Admin</a>
      </p>
      <span class="badge">Express + SQLite</span>
    </main>
  </body>
</html>
