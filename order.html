<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Place order — IS 455</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="order.html">Place order</a>
        <a href="admin.html">Admin</a>
      </nav>
      <h1>Place order</h1>
      <p class="muted" style="margin-bottom: 1rem">
        Fields match the <code>orders</code> table in <code>shop.db</code>. <code>order_id</code> is auto-increment;
        <code>risk_score</code> and <code>is_fraud</code> are labels in the DB (not shown here). No server — this
        form does not submit anywhere.
      </p>

      <form action="#" method="get" onsubmit="return false">
        <div class="row">
          <label for="customer_id">customer_id</label>
          <input id="customer_id" name="customer_id" type="number" min="1" required placeholder="FK → customers" />
        </div>

        <div class="row">
          <label for="order_datetime">order_datetime</label>
          <input id="order_datetime" name="order_datetime" type="datetime-local" required />
        </div>

        <div class="row">
          <label for="billing_zip">billing_zip</label>
          <input id="billing_zip" name="billing_zip" type="text" />
        </div>
        <div class="row">
          <label for="shipping_zip">shipping_zip</label>
          <input id="shipping_zip" name="shipping_zip" type="text" />
        </div>
        <div class="row">
          <label for="shipping_state">shipping_state</label>
          <input id="shipping_state" name="shipping_state" type="text" />
        </div>

        <div class="row">
          <label for="payment_method">payment_method</label>
          <select id="payment_method" name="payment_method" required>
            <option value="card">card</option>
            <option value="paypal">paypal</option>
            <option value="bank">bank</option>
            <option value="crypto">crypto</option>
          </select>
        </div>

        <div class="row">
          <label for="device_type">device_type</label>
          <select id="device_type" name="device_type" required>
            <option value="mobile">mobile</option>
            <option value="desktop" selected>desktop</option>
            <option value="tablet">tablet</option>
          </select>
        </div>

        <div class="row">
          <label for="ip_country">ip_country</label>
          <input id="ip_country" name="ip_country" type="text" required value="US" />
        </div>

        <div class="row">
          <label><input type="checkbox" name="promo_used" value="1" /> promo_used (1 if checked)</label>
        </div>
        <div class="row">
          <label for="promo_code">promo_code</label>
          <input id="promo_code" name="promo_code" type="text" />
        </div>

        <div class="row">
          <label for="order_subtotal">order_subtotal</label>
          <input id="order_subtotal" name="order_subtotal" type="number" step="any" required />
        </div>
        <div class="row">
          <label for="shipping_fee">shipping_fee</label>
          <input id="shipping_fee" name="shipping_fee" type="number" step="any" required />
        </div>
        <div class="row">
          <label for="tax_amount">tax_amount</label>
          <input id="tax_amount" name="tax_amount" type="number" step="any" required />
        </div>
        <div class="row">
          <label for="order_total">order_total</label>
          <input id="order_total" name="order_total" type="number" step="any" required />
        </div>

        <button type="button">Submit (demo — no backend)</button>
      </form>
    </div>
    <script>
      (function () {
        var d = new Date();
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById("order_datetime").value = d.toISOString().slice(0, 16);
      })();
    </script>
  </body>
</html>
